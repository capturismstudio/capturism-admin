<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Capturism Admin</title>
    <script>
      // GitHub Pages SPA redirect
      // When GitHub Pages can't find a route (e.g. /reports/booth-mabillon),
      // it serves this 404.html instead. This script redirects back to index.html
      // with the original path stored in a query parameter, so React Router
      // can handle it properly.
      var pathSegmentsToKeep = 1; // keeps /capturism-admin/ base path
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
